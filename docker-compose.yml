version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: school-election-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: school_election_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ${PWD}/pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: school-election-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/school_election_db
      SECRET_KEY: change_this_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 180
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: school-election-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
