version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: school-election-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ${PWD}/pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: school-election-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      ADMIN_SIGNUP_CODE: ${ADMIN_SIGNUP_CODE}
      KIOSK_VOTE_GAP_SECONDS: ${KIOSK_VOTE_GAP_SECONDS}
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    env_file:
      - ./.env
    environment:
      VITE_API_URL: ${VITE_API_URL}
    volumes:
      - ./frontend/runtime-config.sh:/docker-entrypoint.d/10-runtime-config.sh:ro
    container_name: school-election-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
